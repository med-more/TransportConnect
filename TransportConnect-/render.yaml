# Render.com Blueprint – deploy frontend (static) + backend (Node)
# Docs: https://docs.render.com/blueprint-spec
# After first deploy: set VITE_API_BASE_URL and VITE_SOCKET_URL in the static site env, then redeploy frontend.

services:
  # Backend API + Socket.io (Node/Express)
  - type: web
    name: transportconnect-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is set automatically by Render
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      # Add the rest from your .env (GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, CLOUDINARY_*, EMAIL_*, etc.) in Render dashboard
    healthCheckPath: /api/health

  # Frontend (Vite/React) – static site; enable "Rewrite all to /index.html" in Dashboard for SPA
  - type: static
    name: transportconnect-web
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    # Set in Render dashboard AFTER backend is deployed: VITE_API_BASE_URL, VITE_SOCKET_URL
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
